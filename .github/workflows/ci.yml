name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test + vet + smoketest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod / go.sum are not tidy:"
            git diff go.mod go.sum
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        run: go test -race -count=1 ./...

      - name: fuzz smoke (decoders must not panic on attacker input)
        run: |
          go test ./encoding/ -run '^$' -fuzz 'FuzzDecodeCU64Standalone$' -fuzztime 20s
          go test ./datamodel/ -run '^$' -fuzz 'FuzzDecodePath$' -fuzztime 20s
          go test ./datamodel/ -run '^$' -fuzz 'FuzzDecodeExtending$' -fuzztime 20s

      - name: smoketest (byte-compat acceptance gate)
        run: go run ./cmd/willow-smoketest

  mobile:
    name: gomobile bind dry-run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install gomobile + gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: gomobile init
        run: gomobile init

      - name: Build iOS XCFramework
        run: gomobile bind -target=ios -o /tmp/Mobile.xcframework ./mobile

      - name: Verify XCFramework structure
        run: |
          test -d /tmp/Mobile.xcframework/ios-arm64/Mobile.framework
          test -f /tmp/Mobile.xcframework/ios-arm64/Mobile.framework/Headers/Mobile.objc.h
          du -sh /tmp/Mobile.xcframework
